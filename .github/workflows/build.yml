name: Ultimate Android Build and Repair
on:
  push:
    branches: [ "main", "رئيسي" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Project Zip If Exists
        run: |
          shopt -s dotglob
          if ls *.zip 1> /dev/null 2>&1; then
            echo "📦 تم العثور على ملف مضغوط، جاري استخراجه..."
            unzip -q *.zip -d extracted_project
            rm -rf *.zip
          fi

      - name: Locate Project Root and Flatten
        run: |
          if [ -d "extracted_project" ]; then
            build_file=$(find extracted_project -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
            if [ ! -z "$build_file" ]; then
              project_dir=$(dirname "$build_file")
              echo "📌 تم العثور على جذر المشروع في: $project_dir"
              cp -r $project_dir/* .
              rm -rf extracted_project
            fi
          fi

      - name: Purge and Download Clean Official Gradle Wrapper
        run: |
          echo "🔄 جاري تنظيف وإزالة الملفات التالفة وتحميل مغلّف Gradle رسمي وسليم..."
          # مسح الملفات القديمة التالفة تماماً
          rm -f gradlew gradlew.bat
          rm -rf gradle/wrapper
          mkdir -p gradle/wrapper

          # 1. كتابة ملف الخصائص لإصدار 8.7 المتوافق حتماً
          cat << EOF > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # 2. تحميل ملف الـ jar الأصلي النظيف مباشرة من مستودعات Gradle الرسمية لتفادي التلف
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          
          # 3. تحميل ملف تشغيل السيرفر الأساسي
          curl -Lo gradlew https://github.com/gradle/gradle/raw/v8.7.0/gradlew
          chmod +x gradlew

      - name: Fix Missing Environment Files
        run: |
          echo "📝 إنشاء ملفات البيئة الافتراضية الناقصة لمنع توقف المحرك..."
          touch .env
          touch .env.example

      - name: Auto-Fix Google Services Package Mismatch
        run: |
          python3 -c "
          import json, os
          target_pkg = 'com.aistudio.maranchat.hrzpqm'
          dummy_json = {
              'project_info': {'project_number': '123456789', 'project_id': 'dummy-id', 'storage_bucket': 'dummy.appspot.com'},
              'client': [{'client_info': {'mobilesdk_app_id': '1:123:android:123', 'android_client_info': {'package_name': target_pkg}}, 'api_key': [{'current_key': 'dummy_key'}], 'services': {}}]
          }
          paths = ['app/google-services.json', 'google-services.json']
          fixed = False
          for p in paths:
              if os.path.exists(p):
                  try:
                      with open(p, 'r') as f:
                          data = json.load(f)
                      if 'project_info' not in data: data['project_info'] = dummy_json['project_info']
                      if 'client' in data and len(data['client']) > 0:
                          for c in data['client']:
                              if 'client_info' in c and 'android_client_info' in c['client_info']:
                                  c['client_info']['android_client_info']['package_name'] = target_pkg
                      else:
                          data['client'] = dummy_json['client']
                      with open(p, 'w') as f:
                          json.dump(data, f, indent=4)
                      print(f'✅ تم تطابق وإصلاح حزمة خدمات جوجل في: {p}')
                      fixed = True
                  except Exception as e:
                      with open(p, 'w') as f: json.dump(dummy_json, f, indent=4)
                      fixed = True
          if not fixed:
              out = 'app/google-services.json' if os.path.exists('app') else 'google-services.json'
              os.makedirs(os.path.dirname(out) if os.path.dirname(out) else '.', exist_ok=True)
              with open(out, 'w') as f: json.dump(dummy_json, f, indent=4)
          "

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Android APK (Debug)
        run: |
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload Repaired APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Repaired-APK
          path: '**/build/outputs/apk/debug/*.apk'

